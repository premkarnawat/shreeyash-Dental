# render.yaml — Render.com deployment config (optional, auto-detected)
services:
  - type: web
    name: shreeyash-dental-agents
    env: node
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_VOICE_NUMBER
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: BASE_URL
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: CLINIC_NAME
        value: Shree Yash Multispeciality Dental Clinic
      - key: DOCTOR_NAME
        value: Dr. Sagar Jadhav
      - key: CLINIC_PHONE
        value: "+919850044913"
